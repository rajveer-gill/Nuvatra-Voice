name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    name: Backend Tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: pip install -r backend/requirements.txt
      - name: Run pytest
        run: cd backend && python -m pytest tests -v --tb=short

  backend-security-regressions:
    name: Backend Security Regressions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: pip install -r backend/requirements.txt
      - name: Run authz and cron hardening tests
        run: cd backend && python -m pytest tests/test_cron_auth.py tests/test_admin_tenant_twilio.py tests/test_admin_hardening_endpoints.py -v --tb=short

  backend-health-smoke:
    name: Backend Health Smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: pip install -r backend/requirements.txt
      - name: Start backend and curl /api/health
        env:
          OPENAI_API_KEY: sk-test-ci-placeholder
        run: |
          cd backend
          uvicorn main:app --host 127.0.0.1 --port 8765 &
          sleep 8
          curl -sf http://127.0.0.1:8765/api/health | grep -q '"status"'

  frontend-lint:
    name: Frontend Lint (ESLint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
      - name: Install dependencies
        run: npm ci
      - name: Run lint
        run: npm run lint

  frontend-build:
    name: Frontend Build (next build)
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: sk-test-ci-placeholder
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_Y2ktYnVpbGQtY2hlY2stMDAwMDAwMDAwMDAwMDAwMDAwMDAw
      CLERK_SECRET_KEY: sk_test_Y2ktYnVpbGQtY2hlY2stMDAwMDAwMDAwMDAwMDAwMDAwMDAw
      NEXT_PUBLIC_CLERK_SIGN_IN_URL: /sign-in
      NEXT_PUBLIC_CLERK_SIGN_UP_URL: /sign-up
      NEXT_PUBLIC_CLERK_JWT_TEMPLATE: nuvatra-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
      - name: Install dependencies
        run: npm ci
      - name: Run build
        run: npm run build

  call-flow-contract:
    name: Call flow doc contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check call-flow-v1.md updated with behavior changes
        run: bash scripts/check-call-flow-contract.sh origin/main
