# Alembic configuration for the Nuvatra Voice backend.
#
# The database URL is NOT set here — it is read from the DATABASE_URL
# environment variable in alembic/env.py (the same variable the app uses),
# so migrations always target whatever database the app would.
#
# Usage (from backend/):
#   alembic upgrade head           # apply pending migrations
#   alembic stamp 0001_baseline    # mark an existing DB as at the baseline
#   alembic revision -m "add foo"  # scaffold a new migration
# See docs/MIGRATIONS.md for the full runbook.

[alembic]
script_location = alembic

# Version filenames: <NNNN>_<slug>.py, e.g. 0002_add_lead_notes.py
file_template = %%(rev)s_%%(slug)s

# Keep revision ids human-readable and ordered; env.py supplies the actual URL.
truncate_slug_length = 40
prepend_sys_path = .

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
