# Netlify build for Next.js frontend only (backend runs on Render).
# Do not install Python; this site is Node/Next.js only.

[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"
  # NEXT_PUBLIC_* and API URL are inlined in the client bundle and appear in example/docs — not secret.
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY,NEXT_PUBLIC_API_URL"
  # Don't flag example env file or docs that document these vars.
  SECRETS_SCAN_OMIT_PATHS = ".env.local.example,AUTH-SETUP.md,DEPLOYMENT.md,PHONE-SETUP.md,README.md"

# --- Staging frontend (see STAGING.md) ---
# Production builds (the production branch) keep using the dashboard's env vars.
# Builds from the `staging` branch and PR deploy-previews are pointed at the
# STAGING backend + a Clerk DEVELOPMENT instance, so they can never read or write
# production data. Replace the placeholder URLs/keys with your real staging values
# (or set them per-context in Netlify → Site settings → Environment variables).
[context.staging.environment]
  NEXT_PUBLIC_API_URL = "https://nuvatra-voice-backend-staging.onrender.com"
  NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY = "pk_test_Y2F1c2FsLXJlZGJpcmQtNjcuY2xlcmsuYWNjb3VudHMuZGV2JA"
  # Frontend requests this Clerk JWT template so tokens carry the aud the backend
  # validates. The same-named template must exist in the dev Clerk instance with
  # aud = CLERK_AUDIENCE (https://nuvatra-voice.onrender.com). See docs/CLERK-JWT-SETUP.md.
  NEXT_PUBLIC_CLERK_JWT_TEMPLATE = "nuvatra-backend"

[context.deploy-preview.environment]
  NEXT_PUBLIC_API_URL = "https://nuvatra-voice-backend-staging.onrender.com"
  NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY = "pk_test_Y2F1c2FsLXJlZGJpcmQtNjcuY2xlcmsuYWNjb3VudHMuZGV2JA"
  NEXT_PUBLIC_CLERK_JWT_TEMPLATE = "nuvatra-backend"
